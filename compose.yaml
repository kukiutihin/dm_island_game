services:
  # dmislandclient:
  #   image: dmislandclient
  #   build:
  #     context: .
  #     dockerfile: services/client/DMIslandClient/Dockerfile
  dmislandserver:
    image: dmislandserver
    build:
      context: ./services/DMIslandServer
      dockerfile: Dockerfile
    ports:
      - "5229:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
  
  agent_runner:
    image: agent_runner
    build:
      context: ./services/agent-runner
      dockerfile: Dockerfile
    depends_on:
      - mcp-server
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-yandexgpt}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_MODEL: ${YANDEX_MODEL:-yandexgpt/latest}
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID:-}
      GIGACHAT_CLIENT_SECRET: ${GIGACHAT_CLIENT_SECRET:-}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat:latest}
      MCP_SERVER_HOST: mcp-server
      MCP_SERVER_PORT: "5000"
      MAX_STEPS: ${MAX_STEPS:-100}
      MAX_TOKENS: ${MAX_TOKENS:-50000}
  
  mcp-server:
    image: mcp-server
    build:
      context: ./services/mcp-server
      dockerfile: Dockerfile
    depends_on:
      - dmislandserver
    environment:
      GAME_SERVICE_URL: http://dmislandserver:8080
    ports:
      - "5000:5000"


