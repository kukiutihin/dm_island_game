name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: agent-runner (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - run: ruff check .

      - run: pytest

  dotnet:
    name: game engine (dotnet test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore tests/DMIslandServer.Tests/RoguelikeServerMVP.Tests.csproj

      - run: dotnet test tests/DMIslandServer.Tests/RoguelikeServerMVP.Tests.csproj --no-restore --verbosity normal
