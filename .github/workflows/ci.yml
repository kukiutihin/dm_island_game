name: CI

# Run on every push and PR. Two independent jobs:
#   * python  — lint (ruff) + unit tests (pytest) for the agent-runner.
#   * dotnet  — xUnit tests for the C# game engine.
# Both must be green for the build to pass.

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: agent-runner (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit tests (pytest)
        run: pytest

  dotnet:
    name: game engine (dotnet test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore tests/DMIslandServer.Tests/RoguelikeServerMVP.Tests.csproj

      - name: Test
        run: dotnet test tests/DMIslandServer.Tests/RoguelikeServerMVP.Tests.csproj --no-restore --verbosity normal
