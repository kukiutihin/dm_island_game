# `skib/` is a checked-in third-party virtualenv and is never linted or tested.

[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = ["skib", "**/__pycache__", ".pytest_cache"]

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
# test_mcp.py at the repo root talks to a live server, so only collect the agent-runner suite.
testpaths = ["services/agent-runner"]
addopts = "-q"
