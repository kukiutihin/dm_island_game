# Runs the DM Island game server.
#
#   docker compose up --build      # build + start the server (replaces build.sh / run.sh)
#   docker compose up -d           # start in the background
#   docker compose down            # stop and remove
#
# The server listens on http://localhost:5229 (mapped below).
#
# The game CLIENT is an OpenGL/OpenTK desktop window and cannot be shown from a
# container on macOS/Windows, so run it on the host (it connects to localhost:5229):
#
#   dotnet run --project src/DMIslandClient
#
# (A Linux-only X11 client service is sketched at the bottom of this file.)

services:
  server:
    build:
      context: .
      dockerfile: src/DMIslandServer/Dockerfile
    image: dmisland-server
    container_name: dmisland-server
    ports:
      - "5229:5229"
    # The LLM-controlled mob reads LLM_PROVIDER + provider keys from this file.
    env_file:
      - services/agent-runner/.env
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5229
      ASPNETCORE_ENVIRONMENT: Development
    restart: unless-stopped

  # AI stack: an MCP server exposing the game as tools, and an LLM agent that plays it.
  # `docker compose up server mcp-server` runs just the game + tool server;
  # the agent needs LLM keys (set them in a .env / your shell — see services/agent-runner/.env.example).
  mcp-server:
    build:
      context: ./services/mcp-server
      dockerfile: Dockerfile
    image: dmisland-mcp-server
    depends_on: [server]
    environment:
      GAME_SERVICE_URL: http://server:5229
      MCP_PORT: "5000"
    ports:
      # Host 5050 -> container 5000 (macOS uses :5000 for AirPlay Receiver).
      # The agent connects to mcp-server:5000 over the internal network, not this.
      - "5050:5000"
    restart: unless-stopped

  agent_runner:
    build:
      context: ./services/agent-runner
      dockerfile: Dockerfile
    image: dmisland-agent-runner
    depends_on: [mcp-server]
    # Reads LLM_PROVIDER + provider keys + MAX_STEPS/MAX_TOKENS from your existing file.
    env_file:
      - services/agent-runner/.env
    # MCP wiring is fixed by the compose network and overrides anything in the env file.
    environment:
      MCP_SERVER_HOST: mcp-server
      MCP_SERVER_PORT: "5000"

# ---------------------------------------------------------------------------
# Optional: run the client in a container too. Only viable on a Linux host with
# an X11 server (it needs the display and GPU). On macOS/Windows run the client
# on the host instead (see the comment above). Enable with:
#
#   xhost +local:docker
#   docker compose --profile client up --build
#
# Note: the client hard-codes http://localhost:5229
# (src/DMIslandClient/Scenes/MainMenuScene.fs); point it at http://server:5229
# or share the host network for this to reach the server container.
#
